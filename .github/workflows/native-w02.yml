name: Native W02 MIR

on:
  push:
    paths:
      - "Zend/Native/MIR/**"
      - "docs/native-engine/mir/**"
      - "docs/native-engine/semantics/**"
      - "scripts/native/mir/**"
      - "scripts/native/semantics/**"
      - "tests/native/mir/**"
      - ".github/workflows/native-w02.yml"
  pull_request:
    paths:
      - "Zend/Native/MIR/**"
      - "docs/native-engine/mir/**"
      - "docs/native-engine/semantics/**"
      - "scripts/native/mir/**"
      - "scripts/native/semantics/**"
      - "tests/native/mir/**"
      - ".github/workflows/native-w02.yml"

permissions:
  contents: read

jobs:
  contracts-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LC_ALL: C
      TZ: UTC
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Validate W01
        run: python3 scripts/native/semantics/validate-w01.py --check
      - name: Validate frozen MIR contract
        run: python3 scripts/native/mir/check-contract.py --check
      - name: Validate W02 and deterministic report
        run: python3 scripts/native/mir/validate-w02.py --check
      - name: AddressSanitizer integration
        run: python3 scripts/native/mir/test-w02.py --cc cc --sanitizer address
      - name: UndefinedBehaviorSanitizer integration
        run: python3 scripts/native/mir/test-w02.py --cc cc --sanitizer undefined
      - name: Fixed-seed mutation fuzz
        run: >-
          python3 tests/native/mir/fuzz/run_mutation_fuzz.py
          --seed 20260717 --cases 20000
      - name: Verify generated files are unchanged
        run: git diff --exit-code
