name: Native W03 lowering

on:
  push:
    paths:
      - "Zend/Native/Lowering/**"
      - "Zend/Native/MIR/**"
      - "docs/native-engine/lowering/**"
      - "docs/native-engine/waves/**"
      - "ext/native_mir_test/**"
      - "scripts/native/lowering/**"
      - "scripts/native/profiles/w03-*.env"
      - "tests/native/lowering/**"
      - ".github/workflows/native-w03.yml"
  pull_request:
    paths:
      - "Zend/Native/Lowering/**"
      - "Zend/Native/MIR/**"
      - "docs/native-engine/lowering/**"
      - "docs/native-engine/waves/**"
      - "ext/native_mir_test/**"
      - "scripts/native/lowering/**"
      - "scripts/native/profiles/w03-*.env"
      - "tests/native/lowering/**"
      - ".github/workflows/native-w03.yml"

permissions:
  contents: read

jobs:
  hard-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LANG: C
      LC_ALL: C
      TZ: UTC
      PYTHONDONTWRITEBYTECODE: "1"
      NATIVE_JOBS: "2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install php-src build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bison re2c

      - name: Prepare evidence directory
        run: mkdir -p "$RUNNER_TEMP/w03-artifacts"

      - name: Validate prerequisite contracts and W03 report
        run: |
          {
            python3 scripts/native/semantics/validate-w01.py --check
            python3 scripts/native/mir/validate-w02.py --check
            python3 scripts/native/lowering/check-contract.py --check
            python3 scripts/native/lowering/validate-w03.py --check
          } 2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Build explicit reference PHP
        run: |
          reference_root="$RUNNER_TEMP/php-w03-reference"
          git worktree add --detach "$reference_root" 47355da494ba696b1bdb6d10448a225e742bd316
          (
            cd "$reference_root"
            ./buildconf --force
            ./configure \
              --disable-all \
              --enable-cli \
              --disable-cgi \
              --disable-phpdbg \
              --without-pear
            make -j"$NATIVE_JOBS" sapi/cli/php
          ) 2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          echo "REFERENCE_PHP=$reference_root/sapi/cli/php" >> "$GITHUB_ENV"

      - name: Build and test normal W03 candidate
        run: |
          build_log="$RUNNER_TEMP/w03-debug-nts-build.log"
          scripts/native/build.sh \
            --profile w03-debug-nts \
            --print-binary 2>&1 | tee "$build_log"
          cat "$build_log" >> "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          candidate_php=$(tail -n 1 "$build_log")
          echo "CANDIDATE_PHP=$candidate_php" >> "$GITHUB_ENV"
          python3 scripts/native/lowering/test-w03.py \
            --reference-php "$REFERENCE_PHP" \
            --candidate-php "$candidate_php" \
            --json-out "$RUNNER_TEMP/w03-artifacts/normal.json" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Build and test ASan W03 candidate
        run: |
          build_log="$RUNNER_TEMP/w03-asan-build.log"
          scripts/native/build.sh \
            --profile w03-asan-nts \
            --print-binary 2>&1 | tee "$build_log"
          cat "$build_log" >> "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          candidate_php=$(tail -n 1 "$build_log")
          python3 scripts/native/lowering/test-w03.py \
            --reference-php "$REFERENCE_PHP" \
            --candidate-php "$candidate_php" \
            --sanitizer address \
            --json-out "$RUNNER_TEMP/w03-artifacts/address.json" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Build and test UBSan W03 candidate
        run: |
          build_log="$RUNNER_TEMP/w03-ubsan-build.log"
          scripts/native/build.sh \
            --profile w03-ubsan-nts \
            --print-binary 2>&1 | tee "$build_log"
          cat "$build_log" >> "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          candidate_php=$(tail -n 1 "$build_log")
          python3 scripts/native/lowering/test-w03.py \
            --reference-php "$REFERENCE_PHP" \
            --candidate-php "$candidate_php" \
            --sanitizer undefined \
            --json-out "$RUNNER_TEMP/w03-artifacts/undefined.json" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Build and test ZTS W03 candidate
        run: |
          build_log="$RUNNER_TEMP/w03-debug-zts-build.log"
          scripts/native/build.sh \
            --profile w03-debug-zts \
            --print-binary 2>&1 | tee "$build_log"
          cat "$build_log" >> "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          candidate_php=$(tail -n 1 "$build_log")
          python3 scripts/native/lowering/test-w03.py \
            --reference-php "$REFERENCE_PHP" \
            --candidate-php "$candidate_php" \
            --json-out "$RUNNER_TEMP/w03-artifacts/zts.json" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Run fixed-seed fuzz gate
        run: |
          python3 tests/native/lowering/fuzz/run_fuzz.py \
            --seed 20260718 \
            --cases 20000 \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Prove standard NTS and ZTS builds remain default-off
        run: |
          {
            scripts/native/build.sh --profile debug-nts
            scripts/native/test-smoke.sh --profile debug-nts
            scripts/native/build.sh --profile debug-zts
            scripts/native/test-smoke.sh --profile debug-zts
            nts_build=$(scripts/native/configure-dev.sh \
              --profile debug-nts --print-build-dir | tail -n 1)
            zts_build=$(scripts/native/configure-dev.sh \
              --profile debug-zts --print-build-dir | tail -n 1)
            test "$("$nts_build/sapi/cli/php" -n -r \
              'echo extension_loaded("native_mir_test") ? "yes" : "no";')" = no
            test "$("$zts_build/sapi/cli/php" -n -r \
              'echo extension_loaded("native_mir_test") ? "yes" : "no";')" = no
          } 2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Run exact lowering discovery command
        run: |
          python3 -m unittest discover \
            -s tests/native/lowering \
            -p 'test_*.py' \
            -v 2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"

      - name: Verify and record external W03 wave evidence
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          for task_id in \
            W03-A-lowering-core-registry \
            W03-B-frontend-operands-facts \
            W03-C-numeric-arithmetic-bitwise \
            W03-D-comparison-boolean-casts \
            W03-E-straight-line-lifetime-return \
            W03-F-mir-scalar-verifier-text \
            W03-G-compile-dump-differential \
            W03-integration-gate
          do
            cp "$RUNNER_TEMP/w03-artifacts/hard-gate.log" \
              "$RUNNER_TEMP/w03-artifacts/$task_id.log"
          done
          python3 scripts/native/lowering/record-w03-results.py \
            --artifact-dir "$RUNNER_TEMP/w03-artifacts" \
            --results-dir "$RUNNER_TEMP/wave-results" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          python3 scripts/native/wave-gate.py validate-definition \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          python3 scripts/native/wave-gate.py check \
            --wave W03 \
            --results-dir "$RUNNER_TEMP/wave-results" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          python3 scripts/native/wave-gate.py render \
            --results-dir "$RUNNER_TEMP/wave-results" \
            --output "$RUNNER_TEMP/w03-artifacts/status.md" \
            2>&1 | tee -a "$RUNNER_TEMP/w03-artifacts/hard-gate.log"
          for task_id in \
            W03-A-lowering-core-registry \
            W03-B-frontend-operands-facts \
            W03-C-numeric-arithmetic-bitwise \
            W03-D-comparison-boolean-casts \
            W03-E-straight-line-lifetime-return \
            W03-F-mir-scalar-verifier-text \
            W03-G-compile-dump-differential \
            W03-integration-gate
          do
            cp "$RUNNER_TEMP/w03-artifacts/hard-gate.log" \
              "$RUNNER_TEMP/w03-artifacts/$task_id.log"
          done

      - name: Upload W03 hard-gate evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-w03-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/w03-artifacts
            ${{ runner.temp }}/wave-results
          if-no-files-found: error
          retention-days: 14
